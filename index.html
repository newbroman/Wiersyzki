// Strip Polish-specific characters down to ASCII-ish for forgiving comparison
const polishFold = (s) =>
  s.toLowerCase()
    .replace(/ą/g, "a").replace(/ć/g, "c").replace(/ę/g, "e")
    .replace(/ł/g, "l").replace(/ń/g, "n").replace(/ó/g, "o")
    .replace(/ś/g, "s").replace(/ź/g, "z").replace(/ż/g, "z");

// Look up a tapped word, trying the rhyme's vocab first then the mini-dict
// then trying to strip common Polish inflectional endings.
function lookupWord(word, rhymeVocab) {
  if (!word) return null;
  const clean = word.trim().toLowerCase().replace(/[.,!?:;„""'()]/g, "");
  if (!clean) return null;

  // 1. Exact match in rhyme vocab
  if (rhymeVocab) {
    for (const v of rhymeVocab) {
      const head = v.word.toLowerCase().replace(/[.,!?:;()]/g, "");
      // The vocab "word" may be "word1 / word2" or "word1, word2" — split on those
      const variants = head.split(/\s*[\/,]\s*/);
      for (const variant of variants) {
        if (variant === clean) return { source: "vocab", meaning: v.meaning };
      }
    }
    // 2. Shared-prefix match in vocab (handles inflections like kotek → koteczku, niedźwiedź → niedźwiedzia)
    // Require at least 3 shared chars (4 for longer words) and limit length divergence.
    for (const v of rhymeVocab) {
      const head = v.word.toLowerCase().replace(/[.,!?:;()]/g, "").split(/\s*[\/,]\s*/)[0];
      if (head.length < 3 || clean.length < 3) continue;
      const minLen = Math.min(head.length, clean.length);
      // For 5+ char words, demand 4 shared chars; for 3-4 char words, 3 shared chars is enough
      const requiredShared = minLen >= 6 ? 4 : 3;
      const headPrefix = head.slice(0, requiredShared);
      const cleanPrefix = clean.slice(0, requiredShared);
      if (polishFold(headPrefix) === polishFold(cleanPrefix)
          && Math.abs(head.length - clean.length) <= 5) {
        return { source: "vocab-stem", meaning: v.meaning, related: v.word };
      }
    }
  }

  // 3. Mini-dictionary exact match
  if (MINI_DICT[clean]) return { source: "dict", meaning: MINI_DICT[clean] };

  // 4. Strip common endings and try again
  // Polish noun/adj endings: -em, -om, -ami, -ach, -ie, -e, -y, -i, -a, -o, -u, -ą, -ę
  // Verb endings: -ę, -em, -esz, -isz, -ymy, -ycie, -ą, -ł, -ła, -ło, -li, -ły
  const endings = ["ami", "ach", "ów", "om", "em", "esz", "isz", "ymy", "ycie",
                   "ie", "ę", "ą", "y", "i", "a", "e", "o", "u", "ł"];
  for (const end of endings) {
    if (clean.endsWith(end) && clean.length > end.length + 2) {
      const stem = clean.slice(0, -end.length);
      if (MINI_DICT[stem]) return { source: "dict-stem", meaning: MINI_DICT[stem], related: stem };
      // Try with a final 'y' or 'a' added (common nominative forms)
      for (const finalLetter of ["", "y", "a", "o", "i"]) {
        if (MINI_DICT[stem + finalLetter])
          return { source: "dict-stem", meaning: MINI_DICT[stem + finalLetter], related: stem + finalLetter };
      }
    }
  }

  return null;
}

// Component: a Polish line whose words are individually tappable.
function ClickablePolish({ text, vocab, onWordTap }) {
  // Split into tokens: words vs. punctuation/whitespace
  // Polish-aware regex: \p{L} would be ideal but we'll list the chars
  const tokens = text.split(/(\s+|[^\wąćęłńóśźżĄĆĘŁŃÓŚŹŻ]+)/);
  return (
    <>
      {tokens.map((tok, i) => {
        if (/^[\wąćęłńóśźżĄĆĘŁŃÓŚŹŻ]+$/.test(tok)) {
          // It's a word — make it tappable
          return (
            <span key={i}
              onClick={(e) => { e.stopPropagation(); onWordTap(tok, e); }}
              style={s.clickableWord}>{tok}</span>
          );
        }
        return <span key={i}>{tok}</span>;
      })}
    </>
  );
}

// Floating tooltip showing the meaning of the currently selected word
function WordTooltip({ data, anchorRect, onDismiss }) {
  if (!data || !anchorRect) return null;
  const top = anchorRect.bottom + window.scrollY + 6;
  const left = Math.max(8, Math.min(window.innerWidth - 280, anchorRect.left + window.scrollX - 8));
  return (
    <>
      <div style={s.tooltipBackdrop} onClick={onDismiss}/>
      <div style={{...s.tooltipBox, top, left}}>
        <div style={s.tooltipWord}>
          {data.word}
          <button onClick={(e) => { e.stopPropagation(); speak(data.word); }} style={s.tooltipSpeak}>🔊</button>
        </div>
        {data.result ? (
          <>
            <div style={s.tooltipMeaning}>{data.result.meaning}</div>
            {data.result.related && (
              <div style={s.tooltipRelated}>from <em>{data.result.related}</em></div>
            )}
          </>
        ) : (
          <div style={s.tooltipMeaningDim}>Not in dictionary. Try tapping a nearby key word.</div>
        )}
      </div>
    </>
  );
}

// Browser feature detection
const SpeechRecognitionImpl =
  typeof window !== "undefined" &&
  (window.SpeechRecognition || window.webkitSpeechRecognition);

const RECOGNITION_AVAILABLE = !!SpeechRecognitionImpl;

// Normalise text for comparison: lowercase, strip punctuation, fold Polish diacritics
function normaliseForMatch(text) {
  return text
    .toLowerCase()
    .replace(/[„""'„".,!?:;()\-—–]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

// Polish diacritic folding (for fuzzy matching)
function foldDiacritics(s) {
  return s
    .replace(/ą/g, "a").replace(/ć/g, "c").replace(/ę/g, "e")
    .replace(/ł/g, "l").replace(/ń/g, "n").replace(/ó/g, "o")
    .replace(/ś/g, "s").replace(/ź/g, "z").replace(/ż/g, "z");
}

// Levenshtein distance for fuzzy word matching
function levenshtein(a, b) {
  if (a === b) return 0;
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = new Array(n + 1);
  for (let j = 0; j <= n; j++) dp[j] = j;
  for (let i = 1; i <= m; i++) {
    let prev = dp[0];
    dp[0] = i;
    for (let j = 1; j <= n; j++) {
      const temp = dp[j];
      dp[j] = a[i - 1] === b[j - 1]
        ? prev
        : 1 + Math.min(prev, dp[j], dp[j - 1]);
      prev = temp;
    }
  }
  return dp[n];
}

// Classify a single word match: exact / close / wrong / missing
// Returns {status: "exact"|"close"|"wrong"|"missing", heardWord?: string}
function classifyWord(expected, heardWord) {
  if (!heardWord) return { status: "missing" };
  const e = normaliseForMatch(expected);
  const h = normaliseForMatch(heardWord);
  if (!e || !h) return { status: "missing", heardWord };
  if (e === h) return { status: "exact", heardWord };
  // Try diacritic-folded comparison
  if (foldDiacritics(e) === foldDiacritics(h)) return { status: "exact", heardWord };
  // Levenshtein distance — allow 1 edit for words >=4 chars, 2 edits for >=7
  const dist = levenshtein(foldDiacritics(e), foldDiacritics(h));
  const maxLen = Math.max(e.length, h.length);
  if (maxLen >= 7 && dist <= 2) return { status: "close", heardWord };
  if (maxLen >= 4 && dist <= 1) return { status: "close", heardWord };
  return { status: "wrong", heardWord };
}

// Compare expected text vs heard text. Returns a per-word breakdown.
// Uses a greedy left-to-right alignment that handles inserted/missed words.
function compareText(expected, heard) {
  const expectedWords = expected.match(/[\wąćęłńóśźżĄĆĘŁŃÓŚŹŻ]+/g) || [];
  const heardWords = (heard || "").match(/[\wąćęłńóśźżĄĆĘŁŃÓŚŹŻ]+/g) || [];

  // Build a fuzzy alignment. For each expected word, try to find a matching
  // heard word within a small window.
  const results = [];
  let heardIdx = 0;
  for (let i = 0; i < expectedWords.length; i++) {
    const exp = expectedWords[i];
    let bestMatch = null;
    let bestStatus = "missing";
    let bestHeardIdx = -1;
    // Look at next few heard words (window of 3) for a match
    for (let j = heardIdx; j < Math.min(heardIdx + 3, heardWords.length); j++) {
      const cls = classifyWord(exp, heardWords[j]);
      if (cls.status === "exact") {
        bestMatch = cls; bestStatus = "exact"; bestHeardIdx = j;
        break; // can't do better
      }
      if (cls.status === "close" && bestStatus !== "close") {
        bestMatch = cls; bestStatus = "close"; bestHeardIdx = j;
      }
    }
    if (bestMatch) {
      results.push({ expected: exp, ...bestMatch });
      heardIdx = bestHeardIdx + 1;
    } else {
      results.push({ expected: exp, status: "missing" });
    }
  }

  const exactCount = results.filter(r => r.status === "exact").length;
  const closeCount = results.filter(r => r.status === "close").length;
  const total = results.length || 1;
  // Score: exact = 1.0, close = 0.5, others = 0
  const score = (exactCount + closeCount * 0.5) / total;
  return {
    words: results,
    score: Math.round(score * 100),
    exactCount,
    closeCount,
    total,
  };
}

// Start a recognition session. Returns a controller {stop}.
// onResult is called with the final transcript (string).
// onError is called with a short error message.
function startRecognition({ onResult, onError, onStart }) {
  if (!RECOGNITION_AVAILABLE) {
    onError && onError("Speech recognition is not supported in this browser. Try Chrome, Edge or Safari.");
    return { stop: () => {} };
  }
  let recog;
  try {
    recog = new SpeechRecognitionImpl();
  } catch (e) {
    onError && onError("Could not initialise speech recognition.");
    return { stop: () => {} };
  }
  recog.lang = "pl-PL";
  recog.interimResults = false;
  recog.continuous = false;
  recog.maxAlternatives = 1;

  let finalTranscript = "";
  let finished = false;

  recog.onstart = () => { onStart && onStart(); };
  recog.onresult = (event) => {
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const r = event.results[i];
      if (r.isFinal) finalTranscript += r[0].transcript;
    }
  };
  recog.onerror = (event) => {
    if (finished) return;
    finished = true;
    let msg = "Recognition error";
    if (event.error === "no-speech") msg = "I didn't hear anything — try again.";
    else if (event.error === "audio-capture") msg = "No microphone detected.";
    else if (event.error === "not-allowed") msg = "Microphone permission denied. Please allow access in your browser settings.";
    else if (event.error === "network") msg = "Network error — speech recognition needs an internet connection.";
    else if (event.error === "language-not-supported") msg = "Polish recognition isn't available on this device.";
    onError && onError(msg);
  };
  recog.onend = () => {
    if (finished) return;
    finished = true;
    if (finalTranscript.trim()) {
      onResult && onResult(finalTranscript.trim());
    } else {
      onError && onError("No speech detected. Try again.");
    }
  };

  try {
    recog.start();
  } catch (e) {
    onError && onError("Could not start the microphone.");
  }

  return {
    stop: () => {
      try { recog.stop(); } catch (e) {}
    }
  };
}

// Mic button — initiates a recognition session, returns the comparison result
function MicButton({ expected, onResult, size = "small" }) {
  const [listening, setListening] = useState(false);
  const [error, setError] = useState(null);
  const ctrlRef = useRef(null);

  const start = () => {
    setError(null);
    if (!RECOGNITION_AVAILABLE) {
      setError("Not supported in this browser");
      return;
    }
    // Stop the synthesizer first — can't listen while speaking
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    setListening(true);
    ctrlRef.current = startRecognition({
      onResult: (heard) => {
        setListening(false);
        const result = compareText(expected, heard);
        onResult && onResult({ heard, ...result });
      },
      onError: (msg) => {
        setListening(false);
        setError(msg);
        setTimeout(() => setError(null), 4000);
      },
    });
  };

  const stop = () => {
    if (ctrlRef.current) ctrlRef.current.stop();
    setListening(false);
  };

  const baseStyle = size === "large" ? s.micBtnLarge : s.micBtn;
  return (
    <span style={{ position: "relative", display: "inline-flex" }}>
      <button
        onClick={listening ? stop : start}
        style={{
          ...baseStyle,
          ...(listening ? s.micBtnActive : {}),
          ...(error ? s.micBtnError : {})
        }}
        title={listening ? "Tap to stop" : "Tap and read this line aloud"}
        aria-label={listening ? "Stop recording" : "Start recording"}
      >
        {listening ? "⏺" : "🎤"}
      </button>
      {error && <span style={s.micError}>{error}</span>}
    </span>
  );
}

// Inline display of recognition result — coloured word-by-word feedback
function RecognitionResult({ result, onReset }) {
  if (!result) return null;
  const scoreColor = result.score >= 80 ? "#6fcf6f" : result.score >= 50 ? "#f5c842" : "#cf6f6f";
  return (
    <div style={s.recogResult}>
      <div style={s.recogScoreRow}>
        <span style={{ ...s.recogScore, color: scoreColor }}>{result.score}%</span>
        <span style={s.recogScoreLabel}>
          {result.exactCount} exact · {result.closeCount} close · {result.total - result.exactCount - result.closeCount} missed
        </span>
        <button onClick={onReset} style={s.recogResetBtn}>×</button>
      </div>
      <div style={s.recogWords}>
        {result.words.map((w, i) => (
          <span key={i} style={{
            ...s.recogWord,
            ...(w.status === "exact" ? s.recogWordExact :
                w.status === "close" ? s.recogWordClose :
                s.recogWordMissing)
          }}>
            {w.expected}
            {w.status === "close" && w.heardWord && (
              <sub style={s.recogHeard}>({w.heardWord})</sub>
            )}
          </span>
        ))}
      </div>
      {result.heard && (
        <div style={s.recogHeardLine}>
          <strong>You said:</strong> <em>{result.heard}</em>
        </div>
      )}
    </div>
  );
}

// Reusable speak-and-score practice for any single Polish phrase (sayings, jokes…)
// Break any Polish phrase/joke into small, natural practice parts (clauses, then
// long clauses into ~5-word groups) so it can be drilled like a rhyme's lines.
function splitIntoSegments(text) {
  if (!text) return [];
  const raw = text
    .split(/(?<=[.!?…:;,—–])\s+|\n+/)
    .map(t => t.trim())
    .filter(Boolean);
  const parts = raw.length ? raw : [text.trim()];
  const out = [];
  parts.forEach(part => {
    const words = part.split(/\s+/);
    if (words.length <= 8) { out.push(part); return; }
    for (let i = 0; i < words.length; i += 5) out.push(words.slice(i, i + 5).join(" "));
  });
  return out.map(pl => ({ pl }));
}

  const [idx, setIdx] = useState(0);
  const [results, setResults] = useState({});
  const [freeformResult, setFreeformResult] = useState(null);

  if (!RECOGNITION_AVAILABLE) {
    return (
      <div style={s.card}>
        <div style={s.practiceUnsupported}>
          <strong>Speech recognition isn't available in this browser.</strong>

        </div>
      </div>

  if (!segments || segments.length === 0) return null;

  const handleResult = (i, r) => setResults(prev => ({ ...prev, [i]: r }));

        <button onClick={() => setMode("freeform")} style={{...s.tabBtn,...(mode==="freeform"?s.tabBtnActive:{})}}>{wholeLabel}</button>
      </div>

      {mode === "guided" && (
        <>
          <div style={s.practiceCurrentLine}>
            <div style={s.practicePolish}>{current.pl}</div>
            {current.en && <div style={s.practiceEnglish}>{current.en}</div>}
            <div style={s.practiceControls}>
              <button onClick={() => speak(current.pl)} style={s.speakBtn}>🔊 Listen</button>
              <MicButton expected={current.pl} onResult={(r) => handleResult(idx, r)} size="large"/>
            </div>
          </div>

          {results[idx] && (
            <RecognitionResult result={results[idx]} onReset={() => setResults(prev => { const n = {...prev}; delete n[idx]; return n; })}/>
          )}

          <div style={s.practiceNav}>
            <button onClick={goPrev} disabled={idx === 0}
              style={{...s.practiceNavBtn,...(idx===0?s.practiceNavBtnDisabled:{})}}>← Prev</button>
            <span style={s.practiceProgress}>{segLabel} {idx+1} of {segments.length}</span>
            <button onClick={goNext} disabled={idx === segments.length - 1}
              style={{...s.practiceNavBtn,...(idx===segments.length-1?s.practiceNavBtnDisabled:{})}}>Next →</button>
          </div>

          {attemptedCount > 0 && (
            <div style={s.practiceLineScores}>
              <div style={{fontSize:13,letterSpacing:"0.08em",textTransform:"uppercase",color:"#a29780",marginBottom:8}}>
                Your scores ({attemptedCount} of {segments.length}, avg {avgScore}%)
              </div>
              {segments.map((seg, i) => {
                const r = results[i];
                if (!r) return null;
                const color = r.score >= 80 ? "#6fcf6f" : r.score >= 50 ? "#f5c842" : "#cf6f6f";
                return (
                  <div key={i} style={s.practiceLineScoreRow}>
                    <span style={s.practiceLineScoreLabel}>{i+1}. {seg.pl}</span>
                    <div style={s.practiceLineScoreBar}><div style={{...s.practiceLineScoreBarFill, width:`${r.score}%`, background:color}}/></div>
                    <span style={{...s.practiceLineScoreVal, color}}>{r.score}%</span>
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}

      {mode === "freeform" && (
        <>
          <div style={s.practiceCurrentLine}>
            <div style={{...s.practicePolish, textAlign:"left", fontSize:"clamp(20px,4.5vw,25px)", lineHeight:1.5}}>
              {segments.map((seg, i) => <div key={i}>{seg.pl}</div>)}

            <div style={s.practiceControls}>
              <button onClick={() => speak(fullPolish)} style={s.speakBtn}>🔊 Listen to all</button>

        </>
      )}
    </div>
  );
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  // Split into chunks at major punctuation so the synthesizer pauses naturally.
  const chunks = text
    .split(/(?<=[.!?:;,—–\-])\s+|\n+/)
    .map(s => s.trim())
    .filter(s => s.length > 0);

  // Pause durations (ms) per closing punctuation — generous to give learners thinking time
  const pauseFor = (chunk) => {
    const last = chunk.slice(-1);
    if (".!?".includes(last)) return 1400;  // sentence end — long pause
    if (":;".includes(last))  return 1000;  // semi-strong break
    if ("—–-".includes(last)) return 850;   // dash
    if (last === ",")         return 750;   // comma
    return 600;                              // line break or other
  };

  // Strip dash characters that the synthesizer would otherwise read aloud
  // (e.g. as "pauza" / "powser"). Em-dashes, en-dashes, and standalone hyphens
  // used as pause markers are silent — we already encode the pause via setTimeout.
  // We preserve hyphens INSIDE words (e.g. "biało-czerwona") by only stripping
  // dashes that have whitespace or end-of-string adjacent to them.
  const cleanForSpeech = (s) => {
    return s
      .replace(/\s*[—–]\s*/g, ' ')        // em/en dashes always silent
      .replace(/\s+-\s+/g, ' ')           // ' - ' (hyphen with spaces) silent
      .replace(/[—–]$/g, '')              // trailing em/en dash
      .replace(/\s-$/g, '')               // trailing ' -'
      .replace(/^[—–]\s*/g, '')           // leading em/en dash
      .replace(/^-\s+/g, '')              // leading '- '
      .replace(/\s+/g, ' ')               // collapse whitespace
      .trim();
  };

  // Speak chunks sequentially with real silent gaps.
  let i = 0;
  const speakNext = () => {
    if (i >= chunks.length) return;
    const chunk = chunks[i++];
    const spoken = cleanForSpeech(chunk);
    if (!spoken) {
      // Chunk was nothing but dashes/whitespace — just honour its pause and move on
      if (i < chunks.length) setTimeout(speakNext, pauseFor(chunk));
      return;
    }
    const u = new SpeechSynthesisUtterance(spoken);
    u.lang = "pl-PL";
    u.rate = 0.8;
    u.pitch = 1.0;
    u.onend = () => {
      if (i < chunks.length) {
        setTimeout(speakNext, pauseFor(chunk));
      }
    };
    u.onerror = () => {
      if (i < chunks.length) setTimeout(speakNext, 200);
    };
    window.speechSynthesis.speak(u);
  };
  speakNext();
}

function useIsMobile() {
  const [m, setM] = useState(window.innerWidth < 640);
  useEffect(() => {
    const h = () => setM(window.innerWidth < 640);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return m;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildGlobalPool(wrongLog) {
  const pool = [];
  rhymes.forEach(r => {
    r.questions.forEach((q, qi) => {
      const key = `${r.id}-${qi}`;
      const wrongCount = wrongLog[key] || 0;
      const copies = 1 + wrongCount; // wrong answers get extra copies = higher probability
      for (let i = 0; i < copies; i++) {
        pool.push({ ...q, rhymeId:r.id, rhymeTitle:r.title, rhymeEmoji:r.emoji, lines:r.lines, vocab:r.vocab, qKey:key });
      }
    });
  });
  return shuffle(pool).slice(0, 24); // cap at 24 for global quiz
}

function QuizEngine({ questions, onComplete, rhyme, onWrong }) {
  const [qi, setQi] = useState(0);
  const [answer, setAnswer] = useState(null);
  const [result, setResult] = useState(null);
  const [score, setScore] = useState(0);

  const q = questions[qi];
  const total = questions.length;
  const lines = q.lines || rhyme?.lines || [];
  const vocab = q.vocab || rhyme?.vocab || [];

  const handleChoice = (choice) => {
    if (result) return;
    const correct = choice === q.answer;
    setAnswer(choice);
    setResult(correct ? "correct" : "wrong");
    if (correct) setScore(s => s+1);
    else if (onWrong && q.qKey) onWrong(q.qKey);
  };

  const next = () => {
    const newScore = score + (result === "correct" ? 1 : 0);
    if (qi+1 >= total) { onComplete(newScore, total); return; }
    setQi(i => i+1); setAnswer(null); setResult(null);
  };

  return (
    <div style={s.card}>
      {/* Progress */}
      <div style={s.progressRow}>
        <span style={s.progressLabel}>Question {qi+1} of {total}</span>
        {q.rhymeTitle && <span style={s.progressSource}>{q.rhymeEmoji} {q.rhymeTitle}</span>}
        <div style={s.progressTrack}>
          {questions.map((_,i) => (
            <div key={i} style={{...s.progressDot,...(i<qi?s.dotDone:{}),...(i===qi?s.dotCurrent:{})}}/>
          ))}
        </div>
      </div>
      {/* Rhyme context */}
      <div style={s.quizBlock}>
        {lines.map((line,i) => (
          <p key={i} style={{...s.quizLine,...(i===q.lineIndex?s.quizLineHL:{})}}>
            {i===q.lineIndex ? (
              <>
                {q.hint.split("_____")[0]}
                <span style={{...s.quizBlank,...(result==="correct"?s.blankOk:{}),...(result==="wrong"?s.blankBad:{})}}>
                  {answer||"_____"}
                </span>
                {q.hint.split("_____")[1]}
              </>
            ) : line.pl}
          </p>
        ))}
      </div>
      {/* Listen to the poem */}
      {lines.length > 0 && (
        <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
          <button onClick={() => speak(lines.map(l => l.pl).join(" "))} style={s.toggleBtn}>🔊 Listen to the poem</button>
        </div>
      )}
      {/* Choices */}
      {!result && (
        <>
          <div style={s.choicesGrid}>
            {q.choices.map(c => <button key={c} onClick={()=>handleChoice(c)} style={s.choiceBtn}>{c}</button>)}
          </div>
          {RECOGNITION_AVAILABLE && (
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:16}}>
              <MicButton expected={q.answer} onResult={({ heard }) => {
                let best = null, bestScore = -1;
                q.choices.forEach(c => { const r = compareText(c, heard); if (r.score > bestScore) { bestScore = r.score; best = c; } });
                if (best) handleChoice(best);
              }} size="large"/>
              <span style={{fontSize:14,color:"#a29780"}}>or speak your answer</span>
            </div>
          )}
        </>
      )}
      {/* Result */}
      {result && (
        <div style={{...s.resultBox,...(result==="correct"?s.resultOk:s.resultBad)}}>
          <span style={s.resultIcon}>{result==="correct"?"✓":"✗"}</span>
          <div style={{flex:1}}>
            {result==="correct"
              ? <><strong>Dobrze!</strong><br/></>
              : <><strong>Nie całkiem.</strong> The answer was <em>{q.answer}</em>.<br/></>}
            <span style={s.resultDetail}>{vocab.find(v=>v.word===q.answer)?.meaning}</span>
          </div>
          <button onClick={next} style={s.nextBtn}>{qi+1>=total?"See results":"Next →"}</button>
        </div>
      )}
    </div>
  );
}

function SayingsQuiz({ onExit }) {
  const pool = useMemo(() => shuffle(sayings), []);
  const [qi, setQi] = useState(0);
  const [answer, setAnswer] = useState(null);
  const [result, setResult] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const q = pool[qi];
  const total = pool.length;

  // Build 4 choices: correct meaning+explanation + 3 wrong ones shuffled
  const choices = useMemo(() => {
    const correct = q.meaning + " " + q.explanation;
    const wrongs = q.wrongChoices.map((m,i) => {
      // Find the actual wrong saying's explanation if available
      return m;
    });
    return shuffle([correct, ...wrongs.slice(0,3)]);
  }, [qi]);

  const correctFull = q.meaning + " " + q.explanation;

  const handleChoice = (choice) => {
    if (result) return;
    const ok = choice === correctFull;
    setAnswer(choice); setResult(ok?"correct":"wrong");
    if (ok) setScore(s=>s+1);
  };

  const next = () => {
    if (qi+1>=total) { setDone(true); return; }
    setQi(i=>i+1); setAnswer(null); setResult(null);
  };

  if (done) return (
    <div style={s.globalIntroCard}>
      <div style={{fontSize:47,marginBottom:8}}>{score===total?"🏆":score>=total*0.7?"⭐":"📚"}</div>
      <h2 style={s.completionTitle}>{score}/{total} correct</h2>
      <p style={s.completionText}>
        {score===total?"Doskonale! You know all the sayings!"
         :score>=total*0.7?"Bardzo dobrze! Keep studying the ones you missed."
         :"Dobry początek! Read the sayings again and try once more."}
      </p>
      <div style={{...s.scoreBar,maxWidth:240,margin:"0 auto 20px"}}>
        <div style={{...s.scoreBarFill,width:`${(score/total)*100}%`}}/>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>

      </div>
    </div>

  return (
    <div style={s.card}>

        <span style={s.progressLabel}>Saying {qi+1} of {total}</span>

            <div key={i} style={{...s.progressDot,...(i<qi?s.dotDone:{}),...(i===qi?s.dotCurrent:{})}}/>

        <div style={{display:"flex",flexDirection:"column",gap:9,marginTop:16}}>
          {choices.map((c,i)=>(
            <button key={i} onClick={()=>handleChoice(c)} style={s.sayingChoiceBtn}>{c}</button>
          ))}
        </div>
      )}
      {result && (
        <div style={{...s.resultBox,...(result==="correct"?s.resultOk:s.resultBad),marginTop:16}}>
          <span style={s.resultIcon}>{result==="correct"?"✓":"✗"}</span>

              ? <><strong>Świetnie!</strong><br/></>

          </div>
          <button onClick={next} style={s.nextBtn}>{qi+1>=total?"See results":"Next →"}</button>
        </div>
      )}
    </div>
  );

// GLOBAL QUIZ PANEL
// ═══════════════════════════════════════════════════════════════════════════

function GlobalQuizPanel({ isMobile }) {
  const [wrongLog, setWrongLog] = useState(()=>LS.get("wrongLog",{}));
  const [pool, setPool] = useState(null);
  const [done, setDone] = useState(false);
  const [finalScore, setFinalScore] = useState(0);
  const [finalTotal, setFinalTotal] = useState(0);

  const totalWrong = Object.values(wrongLog).reduce((a,b)=>a+b,0);

  const start = () => {
    const wl = LS.get("wrongLog",{});
    setWrongLog(wl);
    setPool(buildGlobalPool(wl));
    setDone(false);
  };

  const handleWrong = (qKey) => {
    setWrongLog(prev => {
      const updated = {...prev, [qKey]:(prev[qKey]||0)+1};
      LS.set("wrongLog", updated);
      return updated;
    });
  };

  const handleComplete = (score, total) => {
    setFinalScore(score); setFinalTotal(total); setDone(true);
  };

  const clearLog = () => {
    LS.set("wrongLog",{});
    setWrongLog({});
  };

  // Show which rhymes have wrong answers
  const wrongByRhyme = useMemo(()=>{
    const byRhyme = {};
    Object.entries(wrongLog).forEach(([key,count])=>{
      const rhymeId = parseInt(key.split("-")[0]);
      byRhyme[rhymeId] = (byRhyme[rhymeId]||0)+count;
    });
    return byRhyme;
  },[wrongLog]);

  return (
    <div style={isMobile?s.layoutMobile:s.layoutDesktop}>
      <div style={s.main}>
        {!pool && (
          <div style={s.globalIntroCard}>
            <div style={{fontSize:47,marginBottom:8}}>🌍</div>
            <h2 style={s.globalIntroTitle}>Global Quiz</h2>
            <p style={s.globalIntroText}>
              All {rhymes.reduce((n,r)=>n+r.questions.length,0)} questions from {rhymes.length} rhymes, shuffled.
              Questions you've answered wrongly before appear more often.
            </p>
            {totalWrong > 0 && (
              <div style={s.wrongSummary}>
                <div style={{fontSize:15,color:"#e0a0a0",marginBottom:8}}>
                  ⚠ You have <strong>{totalWrong}</strong> logged wrong answer{totalWrong!==1?"s":""} — these will appear more often.
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginBottom:8}}>
                  {rhymes.filter(r=>wrongByRhyme[r.id]).map(r=>(
                    <span key={r.id} style={s.wrongBadge}>{r.emoji} {r.title} ×{wrongByRhyme[r.id]}</span>
                  ))}
                </div>
                <button onClick={clearLog} style={{...s.secondaryBtn,fontSize:13,padding:"4px 12px"}}>Clear wrong-answer log</button>
              </div>
            )}
            <button onClick={start} style={s.startBtn}>Start Quiz</button>
          </div>
        )}
        {pool && !done && (
          <QuizEngine questions={pool} onComplete={handleComplete} onWrong={handleWrong}/>
        )}
        {done && (
          <div style={s.globalIntroCard}>
            <div style={{fontSize:47,marginBottom:8}}>{finalScore===finalTotal?"🏆":finalScore>=finalTotal*0.7?"⭐":"📚"}</div>
            <h2 style={s.completionTitle}>{finalScore}/{finalTotal} correct</h2>
            <p style={s.completionText}>
              {finalScore===finalTotal?"Doskonale! Perfect score!"
               :finalScore>=finalTotal*0.7?"Bardzo dobrze! Great work."
               :"Dobry początek! Keep practising."}
            </p>
            <div style={{...s.scoreBar,maxWidth:240,margin:"0 auto 20px"}}>
              <div style={{...s.scoreBarFill,width:`${(finalScore/finalTotal)*100}%`}}/>
            </div>
            <button onClick={start} style={s.startBtn}>Try again</button>
          </div>
        )}
      </div>
    </div>
  );
}

  const handleWordTap = (word, e) => {
    const result = lookupWord(word, rhyme.vocab);
    const anchorRect = e.currentTarget.getBoundingClientRect();
    setWordTooltip({ word, result, anchorRect });
  };
  const handleQuizComplete = (score, total) => {
    setQuizScore(score); setQuizTotal(total); setQuizDone(true);
    addHistory({ date:new Date().toISOString(), rhymeId:id, score, total });
  };
  const retryQuiz = () => { setQuizDone(false); setQuizKey(k => k + 1); };
  const rhymeHistory = history.filter(h => h.rhymeId === id).slice(0, 5);
  const starred = (bookmarks.rhymes || []).includes(id);
  const rhymeWrong = Object.entries(wrongLog).filter(([k]) => k.startsWith(`${id}-`)).reduce((a, [, v]) => a + v, 0);

  return (
    <div style={NAV.screen}>
      <NavBar title={rhyme.title} onBack={back}/>
      <div style={NAV.body}>
        <div style={s.rhymeHeader}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <h2 style={s.rhymeTitle}>{rhyme.emoji} {rhyme.title}</h2>
              <span style={{...s.diffPill,fontSize:13,color:DIFF_COLORS[rhyme.difficulty],borderColor:DIFF_COLORS[rhyme.difficulty]}}>{rhyme.difficulty}</span>
              {rhyme.verified
                ? <a href={rhyme.source_url} target="_blank" rel="noopener noreferrer" style={s.verifiedBadge} title={"Verified Polish source: " + rhyme.source_url}>✓ Verified</a>
                : <span style={s.unverifiedBadge} title="Source not verified">⚠ Unverified</span>}
            </div>
            <p style={s.rhymeSubtitle}>{rhyme.english_title}</p>
            {rhyme.verified && rhyme.author && <p style={s.attribution}>{rhyme.author}{rhyme.era ? " · " + rhyme.era : ""}</p>}
            {rhyme.verified && rhyme.cultural_note && <p style={s.cultureNote}>{rhyme.cultural_note}</p>}
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0,alignItems:"flex-start"}}>
            <button onClick={() => toggleBookmark("rhymes", id)}
              style={{...s.speakBtn,color:starred?"#f5c842":"#6a5a3a",borderColor:starred?"#7a6020":"#3a2a14",fontSize:21}}>{starred?"★":"☆"}</button>
            <button onClick={() => speak(rhyme.lines.map(l => l.pl).join(" "))} style={s.speakBtn}>🔊 Listen</button>
          </div>
        </div>

        {rhymeWrong > 0 && (
          <div style={s.wrongAlert}>⚠ You've missed <strong>{rhymeWrong}</strong> question{rhymeWrong!==1?"s":""} from this rhyme in the global quiz. Extra practice recommended!</div>
        )}

        <div style={s.tabs}>
          {rhymeTabs.map(t => (
            <button key={t} onClick={() => { setTab(t); retryQuiz(); }}
              style={{...s.tabBtn,...(tab===t?s.tabBtnActive:{})}}>{t}</button>
          ))}
        </div>

        {tab === "Rhyme" && (
          <div style={s.card}>
            <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
              <button onClick={() => setShowTranslation(v => !v)} style={s.toggleBtn}>{showTranslation?"Hide":"Show"} translation</button>
              <button onClick={() => speak(rhyme.lines.map(l => l.pl).join(" "))} style={{...s.toggleBtn,flex:"none"}}>🔊 Listen</button>
            </div>
            <div style={s.linesContainer}>
              {rhyme.lines.map((line, i) => (
                <LineWithMic key={i} line={line} vocab={rhyme.vocab} showTranslation={showTranslation} onWordTap={handleWordTap}/>
              ))}
            </div>
          </div>
        )}

        {tab === "Vocab" && (
          <div style={s.card}>
            <p style={s.vocabIntro}>Key words from <em>{rhyme.title}</em></p>
            <div style={s.vocabGrid}>
              {rhyme.vocab.map((v, i) => (
                <div key={i} style={s.vocabCard}>
                  <div style={s.vocabWord}><span>{v.word}</span><button onClick={() => speak(v.word)} style={s.vocabSpeak}>🔊</button></div>
                  <div style={s.vocabMeaning}>{v.meaning}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab === "Grammar" && (
          <div style={s.card}>
            <p style={s.vocabIntro}>Grammar notes for <em>{rhyme.title}</em></p>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {rhyme.grammar.map((g, i) => (
                <div key={i} style={s.grammarCard}><div style={s.grammarPoint}>{g.point}</div><div style={s.grammarNote}>{g.note}</div></div>
              ))}
            </div>
          </div>
        )}

        {tab === "Practice" && <PracticePanel rhyme={rhyme}/>}

        {tab === "Quiz" && !quizDone && (
          <QuizEngine key={quizKey} questions={rhyme.questions} rhyme={rhyme} onComplete={handleQuizComplete} onWrong={addWrong}/>
        )}
        {tab === "Quiz" && quizDone && (
          <div style={s.card}>
            <div style={{textAlign:"center",padding:"16px 0 8px"}}>
              <div style={{fontSize:47,marginBottom:8}}>{quizScore===quizTotal?"🏆":quizScore>=quizTotal*0.6?"⭐":"📚"}</div>
              <h3 style={s.completionTitle}>{quizScore}/{quizTotal} correct</h3>
              <p style={s.completionText}>{quizScore===quizTotal?"Doskonale! You aced this rhyme.":quizScore>=quizTotal*0.6?"Dobrze! Try again to get them all.":"Dobry początek! Read the rhyme again then retry."}</p>
              <div style={{...s.scoreBar,maxWidth:200,margin:"0 auto 8px"}}><div style={{...s.scoreBarFill,width:`${(quizScore/quizTotal)*100}%`}}/></div>
              {rhymeHistory.length > 0 && (
                <div style={s.historyBox}>
                  <div style={{fontSize:13,letterSpacing:"0.08em",textTransform:"uppercase",color:"#a69c89",marginBottom:8}}>Past attempts</div>
                  {rhymeHistory.map((h, i) => (
                    <div key={i} style={s.historyRow}>
                      <span style={{color:"#a29780",fontSize:13}}>{new Date(h.date).toLocaleDateString()}</span>
                      <div style={{...s.scoreBar,flex:1,height:6}}><div style={{...s.scoreBarFill,width:`${(h.score/h.total)*100}%`}}/></div>
                      <span style={{color:"#f5c842",fontSize:14,fontWeight:700}}>{h.score}/{h.total}</span>
                    </div>
                  ))}
                </div>
              )}
              <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:16,flexWrap:"wrap"}}>
                <button onClick={retryQuiz} style={s.startBtn}>Try again</button>
                <button onClick={() => setTab("Rhyme")} style={s.secondaryBtn}>Read rhyme</button>
              </div>
            </div>
          </div>
        )}
      </div>
      {wordTooltip && <WordTooltip data={wordTooltip} anchorRect={wordTooltip.anchorRect} onDismiss={() => setWordTooltip(null)}/>}
    </div>
  );
}

function useNavStack(initial) {
  const [stack, setStack] = useState([initial]);
  useEffect(() => {
    const onPop = () => { setStack(st => st.length > 1 ? st.slice(0, -1) : st); window.scrollTo(0, 0); };
    window.addEventListener("popstate", onPop);
    return () => window.removeEventListener("popstate", onPop);
  }, []);
  const go = useCallback((screen) => {
    setStack(st => [...st, screen]);
    history.pushState({ wz: true }, "");
    window.scrollTo(0, 0);
  }, []);
  const back = useCallback(() => { history.back(); }, []);   // drives popstate
  // Jump straight to a section from the menu: reset to a clean home→target stack.
  const jump = useCallback((screen) => {
    if (screen.view === "home") { setStack([{ view:"home" }]); }
    else { setStack([{ view:"home" }, screen]); history.pushState({ wz:true }, ""); }
    window.scrollTo(0, 0);
  }, []);
  return { current: stack[stack.length - 1], depth: stack.length, go, back, jump };
}

function App() {
  const isMobile = useIsMobile();
  const { current, go, back, jump } = useNavStack({ view:"home" });
  const [showHelp, setShowHelp] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [welcomeEnabled, setWelcomeEnabled] = useState(() => LS.get("showWelcome", true));
  const [introOpen, setIntroOpen] = useState(() => LS.get("showWelcome", true));

  const [bookmarks, setBookmarks] = useState(() => LS.get("bookmarks", {rhymes:[],sayings:[]}));
  const [historyLog, setHistoryLog] = useState(() => LS.get("history", []));
  const [wrongLog, setWrongLog] = useState(() => LS.get("wrongLog", {}));
  const [rhymeFilter, setRhymeFilter] = useState({ diff:"All", saved:false });
  const [sayingsSaved, setSayingsSaved] = useState(false);
  const [jokeFilter, setJokeFilter] = useState("All");

  // Nudge the speech engine so voices are loaded before the first "Listen".
  useEffect(() => { try { window.speechSynthesis && window.speechSynthesis.getVoices(); } catch (e) {} }, []);

  const toggleBookmark = useCallback((kind, id) => {
    setBookmarks(prev => {
      const ids = prev[kind] || [];
      const next = ids.includes(id) ? ids.filter(x => x !== id) : [...ids, id];
      const updated = {...prev, [kind]:next};
      LS.set("bookmarks", updated);
      return updated;
    });
  }, []);
  const addHistory = useCallback((entry) => {
    setHistoryLog(prev => { const u = [entry, ...prev].slice(0, 100); LS.set("history", u); return u; });
  }, []);
  const addWrong = useCallback((qKey) => {
    setWrongLog(prev => { const u = {...prev, [qKey]:(prev[qKey]||0)+1}; LS.set("wrongLog", u); return u; });
  }, []);

  const setWelcomePref = useCallback((val) => { setWelcomeEnabled(val); LS.set("showWelcome", val); }, []);

  const store = {
    bookmarks, history: historyLog, wrongLog,
    rhymeFilter, setRhymeFilter, sayingsSaved, setSayingsSaved,
    toggleBookmark, addHistory, addWrong, isMobile,
  };

  const v = current.view;
  let screen;
  if (v === "home")
    screen = <HomeScreen onHelp={() => setShowHelp(true)} onMenu={() => setMenuOpen(true)}
      onPick={(k) => {
        if (k === "rhymes") go({ view:"rhymes-list" });
        else if (k === "sayings") go({ view:"sayings-list" });
        else if (k === "jokes") go({ view:"jokes-cats" });
        else if (k === "quiz") go({ view:"quiz" });
      }}/>;
  else if (v === "rhymes-list")    screen = <RhymesListScreen store={store} go={go} back={back}/>;
  else if (v === "rhymes-detail")  screen = <RhymesDetailScreen id={current.id} store={store} back={back}/>;
  else if (v === "sayings-list")   screen = <SayingsListScreen store={store} go={go} back={back}/>;
  else if (v === "sayings-detail") screen = <SayingsDetailScreen id={current.id} store={store} back={back}/>;
  else if (v === "sayings-quiz")   screen = <SayingsQuizScreen back={back}/>;
  else if (v === "jokes-cats")     screen = <JokesCategoriesScreen go={go} back={back}/>;
  else if (v === "jokes-list")     screen = <JokesListScreen category={current.category} jokeFilter={jokeFilter} setJokeFilter={setJokeFilter} go={go} back={back}/>;
  else if (v === "joke-detail")    screen = <JokeDetailScreen id={current.id} back={back}/>;
  else if (v === "quiz")           screen = <QuizScreen isMobile={isMobile} onBack={back}/>;

  return (
    <div style={s.app}>
      <div style={s.grain}/>
      <HelpContext.Provider value={() => setShowHelp(true)}>
        <MenuContext.Provider value={() => setMenuOpen(true)}>
          <div style={{position:"relative",zIndex:1}}>{screen}</div>
        </MenuContext.Provider>
      </HelpContext.Provider>
      {menuOpen && (
        <MenuDrawer
          onClose={() => setMenuOpen(false)}
          onNavigate={(scr) => { setMenuOpen(false); jump(scr); }}
          onHelp={() => { setMenuOpen(false); setShowHelp(true); }}
          onShowWelcome={() => { setMenuOpen(false); setIntroOpen(true); }}
        />
      )}
      {showHelp && <HelpModal onClose={() => setShowHelp(false)}/>}
      {introOpen && (
        <WelcomeScreen
          enabled={welcomeEnabled}
          setEnabled={setWelcomePref}
          onClose={() => setIntroOpen(false)}
        />
      )}
    </div>
  );
}
