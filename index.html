// PERSISTENCE — localStorage helpers

const LS = {
  get(k, def) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set(k, v)   { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// HELPERS
// ═══════════════════════════════════════════════════════════════════════════

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "pl-PL"; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function useIsMobile() {
  const [m, setM] = useState(window.innerWidth < 640);
  useEffect(() => {
    const h = () => setM(window.innerWidth < 640);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return m;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildGlobalPool(wrongLog) {
  const pool = [];
  rhymes.forEach(r => {
    r.questions.forEach((q, qi) => {
      const key = `${r.id}-${qi}`;
      const wrongCount = wrongLog[key] || 0;
      const copies = 1 + wrongCount; // wrong answers get extra copies = higher probability
      for (let i = 0; i < copies; i++) {
        pool.push({ ...q, rhymeId:r.id, rhymeTitle:r.title, rhymeEmoji:r.emoji, lines:r.lines, vocab:r.vocab, qKey:key });
      }
    });
  });
  return shuffle(pool).slice(0, 24); // cap at 24 for global quiz
}

const DIFF_BG     = { Easy:"rgba(80,160,80,0.1)", Medium:"rgba(200,160,40,0.1)", Hard:"rgba(160,60,60,0.1)" };

// QUIZ ENGINE
// ═══════════════════════════════════════════════════════════════════════════

function QuizEngine({ questions, onComplete, rhyme, onWrong }) {
  const [qi, setQi] = useState(0);
  const [answer, setAnswer] = useState(null);
  const [result, setResult] = useState(null);
  const [score, setScore] = useState(0);

  const q = questions[qi];
  const total = questions.length;
  const lines = q.lines || rhyme?.lines || [];
  const vocab = q.vocab || rhyme?.vocab || [];

  const handleChoice = (choice) => {
    if (result) return;
    const correct = choice === q.answer;
    setAnswer(choice);
    setResult(correct ? "correct" : "wrong");
    if (correct) setScore(s => s+1);
    else if (onWrong && q.qKey) onWrong(q.qKey);
  };

  const next = () => {
    const newScore = score + (result === "correct" ? 1 : 0);
    if (qi+1 >= total) { onComplete(newScore, total); return; }
    setQi(i => i+1); setAnswer(null); setResult(null);
  };

  return (
    <div style={s.card}>
      {/* Progress */}
      <div style={s.progressRow}>
        <span style={s.progressLabel}>Question {qi+1} of {total}</span>
        {q.rhymeTitle && <span style={s.progressSource}>{q.rhymeEmoji} {q.rhymeTitle}</span>}
        <div style={s.progressTrack}>
          {questions.map((_,i) => (
            <div key={i} style={{...s.progressDot,...(i<qi?s.dotDone:{}),...(i===qi?s.dotCurrent:{})}}/>
          ))}
        </div>
      </div>
      {/* Rhyme context */}
      <div style={s.quizBlock}>
        {lines.map((line,i) => (
          <p key={i} style={{...s.quizLine,...(i===q.lineIndex?s.quizLineHL:{})}}>
            {i===q.lineIndex ? (
              <>
                {q.hint.split("_____")[0]}
                <span style={{...s.quizBlank,...(result==="correct"?s.blankOk:{}),...(result==="wrong"?s.blankBad:{})}}>
                  {answer||"_____"}
                </span>
                {q.hint.split("_____")[1]}
              </>
            ) : line.pl}
          </p>
        ))}
      </div>
      {/* Choices */}
      {!result && (
        <div style={s.choicesGrid}>
          {q.choices.map(c => <button key={c} onClick={()=>handleChoice(c)} style={s.choiceBtn}>{c}</button>)}
        </div>
      )}
      {/* Result */}
      {result && (
        <div style={{...s.resultBox,...(result==="correct"?s.resultOk:s.resultBad)}}>
          <span style={s.resultIcon}>{result==="correct"?"✓":"✗"}</span>
          <div style={{flex:1}}>
            {result==="correct"
              ? <><strong>Dobrze!</strong><br/></>
              : <><strong>Nie całkiem.</strong> The answer was <em>{q.answer}</em>.<br/></>}
            <span style={s.resultDetail}>{vocab.find(v=>v.word===q.answer)?.meaning}</span>
          </div>
          <button onClick={next} style={s.nextBtn}>{qi+1>=total?"See results":"Next →"}</button>
        </div>
      )}
    </div>
  );
}

// SAYINGS QUIZ
// ═══════════════════════════════════════════════════════════════════════════

function SayingsQuiz({ onExit }) {
  const pool = useMemo(() => shuffle(sayings), []);
  const [qi, setQi] = useState(0);
  const [answer, setAnswer] = useState(null);
  const [result, setResult] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const q = pool[qi];
  const total = pool.length;

  // Build 4 choices: correct meaning+explanation + 3 wrong ones shuffled
  const choices = useMemo(() => {
    const correct = q.meaning + " " + q.explanation;
    const wrongs = q.wrongChoices.map((m,i) => {
      // Find the actual wrong saying's explanation if available
      return m;
    });
    return shuffle([correct, ...wrongs.slice(0,3)]);
  }, [qi]);

  const correctFull = q.meaning + " " + q.explanation;

  const handleChoice = (choice) => {
    if (result) return;
    const ok = choice === correctFull;
    setAnswer(choice); setResult(ok?"correct":"wrong");
    if (ok) setScore(s=>s+1);
  };

  const next = () => {
    if (qi+1>=total) { setDone(true); return; }
    setQi(i=>i+1); setAnswer(null); setResult(null);
  };

  if (done) return (
    <div style={s.globalIntroCard}>
      <div style={{fontSize:40,marginBottom:8}}>{score===total?"🏆":score>=total*0.7?"⭐":"📚"}</div>
      <h2 style={s.completionTitle}>{score}/{total} correct</h2>
      <p style={s.completionText}>
        {score===total?"Doskonale! You know all the sayings!"
         :score>=total*0.7?"Bardzo dobrze! Keep studying the ones you missed."
         :"Dobry początek! Read the sayings again and try once more."}
      </p>
      <div style={{...s.scoreBar,maxWidth:240,margin:"0 auto 20px"}}>
        <div style={{...s.scoreBarFill,width:`${(score/total)*100}%`}}/>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
        <button onClick={()=>{setQi(0);setAnswer(null);setResult(null);setScore(0);setDone(false);}} style={s.startBtn}>Try again</button>
        <button onClick={onExit} style={s.secondaryBtn}>Back to Sayings</button>
      </div>
    </div>
  );

  return (
    <div style={s.card}>
      <div style={s.progressRow}>
        <span style={s.progressLabel}>Saying {qi+1} of {total}</span>
        <div style={s.progressTrack}>
          {pool.map((_,i)=>(
            <div key={i} style={{...s.progressDot,...(i<qi?s.dotDone:{}),...(i===qi?s.dotCurrent:{})}}/>
          ))}
        </div>
      </div>
      <div style={s.sayingQuizPrompt}>
        <div style={{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#7a6a4a",marginBottom:8}}>What does this saying mean?</div>
        <div style={s.sayingQuizPl}>{q.pl}</div>
        <button onClick={()=>speak(q.pl)} style={{...s.vocabSpeak,fontSize:16,marginTop:6}}>🔊</button>
      </div>
      {!result && (
        <div style={{display:"flex",flexDirection:"column",gap:9,marginTop:16}}>
          {choices.map((c,i)=>(
            <button key={i} onClick={()=>handleChoice(c)} style={s.sayingChoiceBtn}>{c}</button>
          ))}
        </div>
      )}
      {result && (
        <div style={{...s.resultBox,...(result==="correct"?s.resultOk:s.resultBad),marginTop:16}}>
          <span style={s.resultIcon}>{result==="correct"?"✓":"✗"}</span>
          <div style={{flex:1}}>
            {result==="correct"
              ? <><strong>Świetnie!</strong><br/></>
              : <><strong>Nie tym razem.</strong><br/><span style={s.resultDetail}>{correctFull}</span></>}
          </div>
          <button onClick={next} style={s.nextBtn}>{qi+1>=total?"See results":"Next →"}</button>
        </div>
      )}
    </div>
  );
}

function GlobalQuizPanel({ isMobile }) {
  const [wrongLog, setWrongLog] = useState(()=>LS.get("wrongLog",{}));
  const [pool, setPool] = useState(null);
  const [done, setDone] = useState(false);
  const [finalScore, setFinalScore] = useState(0);
  const [finalTotal, setFinalTotal] = useState(0);

  const totalWrong = Object.values(wrongLog).reduce((a,b)=>a+b,0);

  const start = () => {
    const wl = LS.get("wrongLog",{});
    setWrongLog(wl);
    setPool(buildGlobalPool(wl));
    setDone(false);
  };

  const handleWrong = (qKey) => {
    setWrongLog(prev => {
      const updated = {...prev, [qKey]:(prev[qKey]||0)+1};
      LS.set("wrongLog", updated);
      return updated;
    });
  };

  const handleComplete = (score, total) => {
    setFinalScore(score); setFinalTotal(total); setDone(true);
  };

  const clearLog = () => {
    LS.set("wrongLog",{});
    setWrongLog({});
  };

  // Show which rhymes have wrong answers
  const wrongByRhyme = useMemo(()=>{
    const byRhyme = {};
    Object.entries(wrongLog).forEach(([key,count])=>{
      const rhymeId = parseInt(key.split("-")[0]);
      byRhyme[rhymeId] = (byRhyme[rhymeId]||0)+count;
    });
    return byRhyme;
  },[wrongLog]);

  return (
    <div style={isMobile?s.layoutMobile:s.layoutDesktop}>
      <div style={s.main}>
        {!pool && (
          <div style={s.globalIntroCard}>
            <div style={{fontSize:40,marginBottom:8}}>🌍</div>
            <h2 style={s.globalIntroTitle}>Global Quiz</h2>
            <p style={s.globalIntroText}>
              All {rhymes.reduce((n,r)=>n+r.questions.length,0)} questions from {rhymes.length} rhymes, shuffled.
              Questions you've answered wrongly before appear more often.
            </p>
            {totalWrong > 0 && (
              <div style={s.wrongSummary}>
                <div style={{fontSize:13,color:"#e0a0a0",marginBottom:8}}>
                  ⚠ You have <strong>{totalWrong}</strong> logged wrong answer{totalWrong!==1?"s":""} — these will appear more often.
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginBottom:8}}>
                  {rhymes.filter(r=>wrongByRhyme[r.id]).map(r=>(
                    <span key={r.id} style={s.wrongBadge}>{r.emoji} {r.title} ×{wrongByRhyme[r.id]}</span>
                  ))}
                </div>
                <button onClick={clearLog} style={{...s.secondaryBtn,fontSize:11,padding:"4px 12px"}}>Clear wrong-answer log</button>
              </div>
            )}
            <button onClick={start} style={s.startBtn}>Start Quiz</button>
          </div>
        )}
        {pool && !done && (
          <QuizEngine questions={pool} onComplete={handleComplete} onWrong={handleWrong}/>
        )}
        {done && (
          <div style={s.globalIntroCard}>
            <div style={{fontSize:40,marginBottom:8}}>{finalScore===finalTotal?"🏆":finalScore>=finalTotal*0.7?"⭐":"📚"}</div>
            <h2 style={s.completionTitle}>{finalScore}/{finalTotal} correct</h2>
            <p style={s.completionText}>
              {finalScore===finalTotal?"Doskonale! Perfect score!"
               :finalScore>=finalTotal*0.7?"Bardzo dobrze! Great work."
               :"Dobry początek! Keep practising."}
            </p>
            <div style={{...s.scoreBar,maxWidth:240,margin:"0 auto 20px"}}>
              <div style={{...s.scoreBarFill,width:`${(finalScore/finalTotal)*100}%`}}/>
            </div>
            <button onClick={start} style={s.startBtn}>Try again</button>
          </div>
        )}
      </div>
    </div>
  );
}

            <div style={{display:"flex",gap:4,alignItems:"center",justifyContent:"center",marginTop:2}}>
              <span style={{...s.diffPill,color:DIFF_COLORS[r.difficulty],borderColor:DIFF_COLORS[r.difficulty]}}>
                {r.difficulty}
              </span>
              {(bookmarks.rhymes||[]).includes(r.id) && <span style={{fontSize:10,color:"#f5c842"}}>★</span>}
            </div>
          </button>
        ))}
      </div>

      <div style={isMobile?s.layoutMobile:s.layoutDesktop}>
        {/* Desktop sidebar */}
        {!isMobile && (
          <aside style={s.sidebar}>
            <p style={s.sidebarLabel}>Choose a rhyme</p>
            {displayed.map(r=>(
              <button key={r.id} onClick={()=>selectRhyme(r.id)}
                style={{...s.sidebarBtn,...(selectedId===r.id?s.sidebarBtnActive:{})}}>
                <span style={s.sidebarEmoji}>{r.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <span style={s.sidebarBtnTitle}>{r.title}</span>
                  <div style={{display:"flex",gap:6,marginTop:3,alignItems:"center"}}>
                    <span style={{...s.diffPill,fontSize:9,color:DIFF_COLORS[r.difficulty],borderColor:DIFF_COLORS[r.difficulty]}}>
                      {r.difficulty}
                    </span>
                    {(bookmarks.rhymes||[]).includes(r.id) && <span style={{fontSize:11,color:"#f5c842"}}>★</span>}
                  </div>
                </div>
              </button>
            ))}
          </aside>
        )}

        <main style={s.main}>
          {/* Rhyme header */}
          <div style={s.rhymeHeader}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <h2 style={s.rhymeTitle}>{rhyme.emoji} {rhyme.title}</h2>
                <span style={{...s.diffPill,fontSize:11,color:DIFF_COLORS[rhyme.difficulty],borderColor:DIFF_COLORS[rhyme.difficulty]}}>
                  {rhyme.difficulty}
                </span>
              </div>
              <p style={s.rhymeSubtitle}>{rhyme.english_title}</p>
            </div>
            <div style={{display:"flex",gap:8,flexShrink:0,alignItems:"flex-start"}}>
              <button onClick={()=>toggleBookmark(selectedId)}
                style={{...s.speakBtn,color:starred?"#f5c842":"#6a5a3a",borderColor:starred?"#7a6020":"#3a2a14",fontSize:18}}>
                {starred?"★":"☆"}
              </button>
              {!isMobile && (
                <button onClick={()=>speak(rhyme.lines.map(l=>l.pl).join(" "))} style={s.speakBtn}>
                  🔊 Listen
                </button>
              )}
            </div>
          </div>

          {/* Wrong-answer alert */}
          {rhymeWrong > 0 && (
            <div style={s.wrongAlert}>
              ⚠ You've missed <strong>{rhymeWrong}</strong> question{rhymeWrong!==1?"s":""} from this rhyme in the global quiz. Extra practice recommended!
            </div>
          )}

          {/* Tabs */}
          <div style={s.tabs}>
            {rhymeTabs.map(t=>(
              <button key={t} onClick={()=>{setTab(t);retryQuiz();}}
                style={{...s.tabBtn,...(tab===t?s.tabBtnActive:{})}}>
                {t}
              </button>
            ))}
          </div>

          {/* RHYME TAB */}
          {tab==="Rhyme" && (
            <div style={s.card}>
              <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
                <button onClick={()=>setShowTranslation(v=>!v)} style={s.toggleBtn}>
                  {showTranslation?"Hide":"Show"} translation
                </button>
                {isMobile && (
                  <button onClick={()=>speak(rhyme.lines.map(l=>l.pl).join(" "))}
                    style={{...s.toggleBtn,flex:"none"}}>🔊 Listen</button>
                )}
              </div>
              <div style={s.linesContainer}>
                {rhyme.lines.map((line,i)=>(
                  <div key={i} style={s.lineRow}>
                    <button onClick={()=>speak(line.pl)} style={s.miniSpeakBtn}>🔊</button>
                    <div style={s.lineText}>
                      <span style={s.linePl}>{line.pl}</span>
                      {showTranslation && <span style={s.lineEn}>{line.en}</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* VOCABULARY TAB */}
          {tab==="Vocabulary" && (
            <div style={s.card}>
              <p style={s.vocabIntro}>Key words from <em>{rhyme.title}</em></p>
              <div style={s.vocabGrid}>
                {rhyme.vocab.map((v,i)=>(
                  <div key={i} style={s.vocabCard}>
                    <div style={s.vocabWord}>
                      <span>{v.word}</span>
                      <button onClick={()=>speak(v.word)} style={s.vocabSpeak}>🔊</button>
                    </div>
                    <div style={s.vocabMeaning}>{v.meaning}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* GRAMMAR TAB */}
          {tab==="Grammar" && (
            <div style={s.card}>
              <p style={s.vocabIntro}>Grammar notes for <em>{rhyme.title}</em></p>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {rhyme.grammar.map((g,i)=>(
                  <div key={i} style={s.grammarCard}>
                    <div style={s.grammarPoint}>{g.point}</div>
                    <div style={s.grammarNote}>{g.note}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* QUIZ TAB */}
          {tab==="Quiz" && !quizDone && (
            <QuizEngine key={quizKey} questions={rhyme.questions} rhyme={rhyme}
              onComplete={handleQuizComplete} onWrong={handleWrong}/>
          )}

          {tab==="Quiz" && quizDone && (
            <div style={s.card}>
              <div style={{textAlign:"center",padding:"16px 0 8px"}}>
                <div style={{fontSize:40,marginBottom:8}}>
                  {quizScore===quizTotal?"🏆":quizScore>=quizTotal*0.6?"⭐":"📚"}
                </div>
                <h3 style={s.completionTitle}>{quizScore}/{quizTotal} correct</h3>
                <p style={s.completionText}>
                  {quizScore===quizTotal?"Doskonale! You aced this rhyme."
                   :quizScore>=quizTotal*0.6?"Dobrze! Try again to get them all."
                   :"Dobry początek! Read the rhyme again then retry."}
                </p>
                <div style={{...s.scoreBar,maxWidth:200,margin:"0 auto 8px"}}>
                  <div style={{...s.scoreBarFill,width:`${(quizScore/quizTotal)*100}%`}}/>
                </div>
                {/* History */}
                {rhymeHistory.length>0 && (
                  <div style={s.historyBox}>
                    <div style={{fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",color:"#6a5a3a",marginBottom:8}}>Past attempts</div>
                    {rhymeHistory.map((h,i)=>(
                      <div key={i} style={s.historyRow}>
                        <span style={{color:"#7a6a4a",fontSize:11}}>{new Date(h.date).toLocaleDateString()}</span>
                        <div style={{...s.scoreBar,flex:1,height:6}}>
                          <div style={{...s.scoreBarFill,width:`${(h.score/h.total)*100}%`}}/>
                        </div>
                        <span style={{color:"#f5c842",fontSize:12,fontWeight:700}}>{h.score}/{h.total}</span>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:16,flexWrap:"wrap"}}>
                  <button onClick={retryQuiz} style={s.startBtn}>Try again</button>
                  <button onClick={()=>setTab("Rhyme")} style={s.secondaryBtn}>Read rhyme</button>
                </div>
              </div>
            </div>
          )}
        </main>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// APP SHELL
// ═══════════════════════════════════════════════════════════════════════════

function App() {
  const [mode, setMode] = useState("rhymes");
  const isMobile = useIsMobile();
  return (
    <div style={s.app}>
      <div style={s.grain}/>
      <header style={s.header}>
        <div style={s.headerInner}>
          <span style={s.headerIcon}>🪺</span>
          <div style={{flex:1,minWidth:0}}>
            <h1 style={s.headerTitle}>Wierszyki</h1>
            <p style={s.headerSub}>Polish for Learners</p>
          </div>
        </div>
      </header>
      <nav style={s.modeBar}>
        {[["rhymes","📖","Rhymes"],["sayings","💬","Sayings"],["global","🌍","Quiz"]].map(([m,ico,lbl])=>(
          <button key={m} onClick={()=>setMode(m)}
            style={{...s.modeBarBtn,...(mode===m?s.modeBarBtnActive:{})}}>
            <span style={{fontSize:16,lineHeight:1}}>{ico}</span>
            <span>{lbl}</span>
          </button>
        ))}
      </nav>
      {mode==="rhymes"  && <RhymesPanel isMobile={isMobile}/>}
      {mode==="sayings" && <SayingsPanel isMobile={isMobile}/>}
      {mode==="global"  && <GlobalQuizPanel isMobile={isMobile}/>}
    </div>
  );
}
